<body>
<div class="app">
  <div class="hdr">
    <div>
      <div class="hlab">Concept Simulator</div>
      <div class="htitle">NBA Draft <span>Lottery</span></div>
      <div class="hsub">3-Group System · 14-Ball Combination Draw · Live 2025–26 Standings</div>
    </div>
    <div class="hright">
      <div class="sbadge" id="sbadge">2025–26</div>
      <div class="livedot loading" id="livedot">Loading standings…</div>
    </div>
  </div>
  <div class="tabs">
    <button class="tab on" onclick="sw('ov',this)">Overview</button>
    <button class="tab" onclick="sw('run',this)">Run Lottery</button>
    <button class="tab" onclick="sw('step',this)">Step-by-Step</button>
    <button class="tab" onclick="sw('hist',this)">History</button>
  </div>
  <div id="main">
    <div class="loadstate"><div class="spinner"></div><div class="loadtxt">Fetching live NBA standings…</div></div>
  </div>
</div>
<script>

// ════════════════════════════════════════════════════
// LOTTERY MATH — 14-ball, C(14,4)=1001 combinations
// ════════════════════════════════════════════════════
const ALL_COMBOS=(()=>{const c=[];for(let a=1;a<=14;a++)for(let b=a+1;b<=14;b++)for(let cc=b+1;cc<=14;cc++)for(let d=cc+1;d<=14;d++)c.push([a,b,cc,d]);return c;})();
const VOID_KEY='11-12-13-14';
const USABLE=ALL_COMBOS.filter(c=>c.join('-')!==VOID_KEY); // exactly 1000

// GROUP ORDER — 6 orderings of 3 groups, equal 1000-combo share
const GROUP_ORDERINGS=[[0,1,2],[0,2,1],[1,0,2],[1,2,0],[2,0,1],[2,1,0]];
const GO_ALLOC=[167,167,167,167,166,166];
const GO_MAP=(()=>{const m={};let p=0;GO_ALLOC.forEach((n,i)=>{for(let j=0;j<n;j++)m[USABLE[p+j].join('-')]=i;p+=n;});return m;})();

// IN-GROUP PICKS — 6 team ranks, 286/238/190/143/95/48 combos
// rank 0 = best record (most combos), rank 5 = worst record
const TEAM_ALLOC=[48,95,143,190,238,286];
const TEAM_MAP=(()=>{const m={};let p=0;TEAM_ALLOC.forEach((n,ri)=>{for(let j=0;j<n;j++)m[USABLE[p+j].join('-')]=ri;p+=n;});return m;})();

function draw4(){
  const balls=Array.from({length:14},(_,i)=>i+1);
  const drawn=[];
  for(let i=0;i<4;i++){const idx=Math.floor(Math.random()*balls.length);drawn.push(balls.splice(idx,1)[0]);}
  drawn.sort((a,b)=>a-b);
  return {balls:drawn,key:drawn.join('-')};
}

// ════════════════════════════════════════════════════
// APP STATE
// ════════════════════════════════════════════════════
let TEAMS=[],GROUPS=[],HISTORY=[];
let activeTab='ov',autoRunning=false,MS=null;
const GN=['Group 1','Group 2','Group 3'];
const GGC=['gg1','gg2','gg3'],DTC=['dt1','dt2','dt3'],GCLS=['gc1','gc2','gc3'];
const TIDS={ATL:1610612737,BOS:1610612738,BKN:1610612751,CHA:1610612766,CHI:1610612741,CLE:1610612739,DAL:1610612742,DEN:1610612743,DET:1610612765,GSW:1610612744,HOU:1610612745,IND:1610612754,LAC:1610612746,LAL:1610612747,MEM:1610612763,MIA:1610612748,MIL:1610612749,MIN:1610612750,NOP:1610612740,NYK:1610612752,OKC:1610612760,ORL:1610612753,PHI:1610612755,PHX:1610612756,POR:1610612757,SAC:1610612758,SAS:1610612759,TOR:1610612761,UTA:1610612762,WAS:1610612764};

// ════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════
async function init(){
  try{
    setDot('loading','Fetching standings…');
    const res=await fetch('/api/standings');
    if(!res.ok)throw new Error(`API error ${res.status}`);
    const data=await res.json();
    if(!data.success)throw new Error(data.error||'API failure');
    const resolved=await resolveTies(data.teams,data.tiedPairs);
    TEAMS=resolved;
    GROUPS=[0,1,2].map(g=>TEAMS.filter(t=>t.group===g));
    const ts=new Date(data.lastUpdated).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    if(data.isFallback){
      setDot('warn','Using cached standings — NBA API unavailable');
    } else {
      setDot('live',`Live · Updated ${ts}`);
    }
    document.getElementById('sbadge').textContent=data.season||'2025–26';
    renderTab(activeTab);
  }catch(err){
    console.error(err);
    setDot('err','Standings unavailable');
    document.getElementById('main').innerHTML=`<div class="errbox"><div class="errtitle">Could not load standings</div><div class="errtxt">${err.message}<br><br>Ensure API functions are deployed. See <a href="DEPLOY.md" style="color:var(--b)">DEPLOY.md</a></div><button class="btn btn-out" style="margin-top:16px" onclick="init()">Retry</button></div>`;
  }
}

async function resolveTies(teams,pairs){
  if(!pairs||!pairs.length)return teams;
  const out=[...teams];
  for(const pair of pairs){
    try{
      const r=await fetch(`/api/h2h?teamA=${pair.teamA.teamId}&teamB=${pair.teamB.teamId}`);
      if(!r.ok)continue;
      const h2h=await r.json();
      if(!h2h.success)continue;
      const iA=out.findIndex(t=>t.teamId===pair.teamA.teamId);
      const iB=out.findIndex(t=>t.teamId===pair.teamB.teamId);
      if(iA===-1||iB===-1)continue;
      const tA=out[iA],tB=out[iB];
      let better=null;
      if(h2h.winner&&h2h.status==='complete')better=h2h.winner;
      else{const diff=tA.confWinPct-tB.confWinPct;better=Math.abs(diff)>0.001?(diff>0?tA.teamId:tB.teamId):(Math.random()<.5?tA.teamId:tB.teamId);}
      if(better){
        const bi=better===tA.teamId?iA:iB,wi=better===tA.teamId?iB:iA;
        if(out[bi].groupRank<out[wi].groupRank){
          const sB={teamId:out[bi].teamId,city:out[bi].city,name:out[bi].name,fullName:out[bi].fullName,abbr:out[bi].abbr,wins:out[bi].wins,losses:out[bi].losses,winPct:out[bi].winPct,conf:out[bi].conf,confW:out[bi].confW,confL:out[bi].confL,confWinPct:out[bi].confWinPct};
          const sW={teamId:out[wi].teamId,city:out[wi].city,name:out[wi].name,fullName:out[wi].fullName,abbr:out[wi].abbr,wins:out[wi].wins,losses:out[wi].losses,winPct:out[wi].winPct,conf:out[wi].conf,confW:out[wi].confW,confL:out[wi].confL,confWinPct:out[wi].confWinPct};
          out[bi]={...out[bi],...sW,movedUp:true};
          out[wi]={...out[wi],...sB,movedDown:true};
        }
      }
    }catch(e){console.warn('H2H fail',e);}
  }
  return out;
}

function resetRun(){autoRunning=false;const b=document.getElementById('btnrun');if(b)b.disabled=false;renderRun(document.getElementById('main'));}

async function startAuto(){
  if(autoRunning)return;
  autoRunning=true;
  const btnEl=document.getElementById('btnrun');if(btnEl)btnEl.disabled=true;
  const body=document.getElementById('runbody');

  // Phase 1: Group order
  body.innerHTML=`<div class="progwrap"><div class="progbar" id="aprog" style="width:0%"></div></div>
    <div class="machine"><div class="mlabel">Phase 1 — Group Order Draw</div>
      <div class="dstatus" id="apst"><span class="dsmain">Drawing group order…</span></div>
      ${drumHTML('apdrum')}
      <div id="ap-rd"></div>
    </div>
    <div class="gostrip" id="apgo"></div>`;

  await sl(300);
  let goResult;
  let goTries=0;
  while(true){
    goTries++;
    if(goTries>1){document.getElementById('ap-rd').innerHTML=`<div class="redraw-note">Void combo {11·12·13·14} — redrawing…</div>`;await sl(500);resetDrum('apdrum');}
    await spinDrum('apdrum',900);
    const att=draw4();
    await animateDraw('apdrum',att.balls);
    if(att.key===VOID_KEY){setSt('apst','Void combination — redraw!','');await sl(600);resetDrum('apdrum');continue;}
    const oi=GO_MAP[att.key];
    if(oi===undefined){resetDrum('apdrum');continue;}
    goResult={ordering:GROUP_ORDERINGS[oi],combo:att.balls,key:att.key};
    break;
  }
  document.getElementById('ap-rd').innerHTML='';
  setTrayResult('apdrum',goResult.combo,null,null,goResult.ordering);
  setSt('apst',goResult.ordering.map(g=>GN[g]).join(' → '),`Combo {${goResult.combo.join('·')}}`);
  const ordLabel=goResult.ordering.map((gi,pos)=>`<div class="gob"><span class="goslot">${pos+1}.</span><span class="gogrp ${GGC[gi]}">${GN[gi]}</span></div>`).join(`<span class="goarr">→</span>`);
  document.getElementById('apgo').innerHTML=ordLabel;
  setProg('aprog',12);
  await sl(900);

  // Phase 2: Team picks
  const slotResults=[];
  for(let slot=0;slot<3;slot++){
    const gi=goResult.ordering[slot];
    const grp=GROUPS[gi];
    const basePct=12+(slot/3)*88;
    body.innerHTML+=`<div id="gsec-${slot}"></div>`;
    const sec=document.getElementById(`gsec-${slot}`);
    sec.innerHTML=`<div class="machine" style="margin-top:16px"><div class="mlabel">Slot ${slot+1} — ${GN[gi]}</div>
      <div class="dstatus" id="gpst-${slot}"><span class="dsmain">Drawing picks…</span></div>
      ${drumHTML(`gdrum-${slot}`)}
      <div id="grd-${slot}"></div>
      <div class="picklog" id="glog-${slot}"></div>
    </div>`;
    await sl(400);
    const remaining=new Set([0,1,2,3,4,5]);
    const picks=[];
    for(let pk=1;pk<=6;pk++){
      setSt(`gpst-${slot}`,`Drawing pick #${pk}…`,`Overall #${slot*6+pk}`);
      let res;let tries=0;
      while(true){
        tries++;
        if(tries>1){document.getElementById(`grd-${slot}`).innerHTML=`<div class="redraw-note">${tries===2?'Void combo':'Combo already used'} — redraw…</div>`;await sl(450);resetDrum(`gdrum-${slot}`);}
        await spinDrum(`gdrum-${slot}`,750);
        const att=draw4();
        await animateDraw(`gdrum-${slot}`,att.balls);
        if(att.key===VOID_KEY){setSt(`gpst-${slot}`,'Void — redraw!','');await sl(500);resetDrum(`gdrum-${slot}`);continue;}
        const ri=TEAM_MAP[att.key];
        if(ri===undefined){resetDrum(`gdrum-${slot}`);continue;}
        if(!remaining.has(ri)){setSt(`gpst-${slot}`,'Team already picked — redraw!','');await sl(500);resetDrum(`gdrum-${slot}`);continue;}
        remaining.delete(ri);
        res={teamRank:ri,combo:att.balls,key:att.key};
        break;
      }
      document.getElementById(`grd-${slot}`).innerHTML='';
      const t=grp[res.teamRank];
      setTrayResult(`gdrum-${slot}`,res.combo,t,gi,null);
      setSt(`gpst-${slot}`,t.fullName,`{${res.combo.join('·')}} · ${GN[gi]} #${pk} · Overall #${slot*6+pk}`);
      picks.push(res);
      appendPickLog(`glog-${slot}`,pk,slot*6+pk,t,gi,res.combo);
      setProg('aprog',basePct+(pk/6)*(88/3));
      await sl(600);
    }
    slotResults.push({gi,picks});
    await sl(300);
  }
  setProg('aprog',100);
  const fullOrder=buildFullOrder(goResult.ordering,slotResults);
  addHist({goResult,slotResults,fullOrder});
  body.innerHTML+=fullHTML({go:goResult.ordering,goCombo:goResult.combo,fullOrder});
  autoRunning=false;if(btnEl)btnEl.disabled=false;
  confetti();
}

function renderStep(el){
  if(!MS)MS=freshMS();

  renderStepBody();

function freshMS(){return{phase:'group_draw',goResult:null,currentSlot:0,slotResults:[],currentPicks:[],remaining:new Set([0,1,2,3,4,5])};}
function resetStep(){MS=freshMS();renderStep(document.getElementById('main'));}

function renderStepBody(){
  const body=document.getElementById('stepbody');if(!body)return;
  const s=MS;let h='';
  if(s.phase==='group_draw'||s.phase==='group_reveal'){
    h+=`<div class="phasebanner"><div class="phnum">1</div><div><div class="phtitle">Group Order Draw</div><div class="phdesc">14 balls · draw 4 · 1,000 combos → one of 6 orderings (each ~16.7%)</div></div></div>`;
    h+=`<div class="machine"><div class="mlabel">Lottery Machine — Group Order</div><div class="dstatus" id="m-gst"><span class="dsmain">${s.goResult?s.goResult.ordering.map(g=>GN[g]).join(' → '):'Ready to draw'}</span></div>${drumHTML('m-gdrm',s.goResult?s.goResult.combo:null)}<div id="m-grd"></div></div>`;
    if(!s.goResult){
      h+=`<button class="btn btn-gold" id="m-gobtn" onclick="mDrawGroup()">Draw Group Order</button>`;
    }else{
      h+=`<div class="gostrip">`;
      s.goResult.ordering.forEach((gi,i)=>{if(i>0)h+=`<span class="goarr">→</span>`;h+=`<div class="gob"><span class="goslot">${i+1}.</span><span class="gogrp ${GGC[gi]}">${GN[gi]}</span></div>`;});
      h+=`</div><button class="btn btn-gold" onclick="mStartTeams()">Continue to Team Draws →</button>`;
    }
  }else if(s.phase==='teams'){
    h+=`<div style="font-size:12px;color:var(--muted);margin-bottom:16px">Group order: <strong style="color:var(--txt)">${s.goResult.ordering.map(g=>GN[g]).join(' → ')}</strong></div>`;
    s.goResult.ordering.forEach((gi,slot)=>{
      const done=slot<s.currentSlot||(slot===s.currentSlot&&s.currentPicks.length===6);
      const act=slot===s.currentSlot;
      const pend=slot>s.currentSlot;
      const grp=GROUPS[gi];
      const result=s.slotResults[slot];
      h+=`<div class="mgcard ${act?'act':''}"><div style="display:flex;align-items:center;gap:10px;margin-bottom:${pend?0:14}px">
        <span style="font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:3px 10px;border-radius:5px;${gi===0?'background:var(--rl);color:var(--r);border:1px solid var(--rb)':gi===1?'background:var(--bl);color:var(--b);border:1px solid var(--bb)':'background:var(--gl);color:var(--g);border:1px solid var(--gb)'}">${GN[gi]}</span>
        <span style="font-size:12px;color:${done?'var(--muted)':act?'var(--gold)':'var(--faint)'}">${done?'✓ Complete':act?`Drawing pick #${s.currentPicks.length+1} of 6`:'Pending'}</span>
      </div>`;
      if(!pend){
        h+=`<div class="machine" style="margin-bottom:12px"><div class="mlabel">Lottery Machine — ${GN[gi]}</div><div class="dstatus" id="m-tst-${slot}"><span class="dsmain">${act&&s.currentPicks.length<6?`Pick #${s.currentPicks.length+1}`:'Ready'}</span></div>${drumHTML(`m-tdrm-${slot}`)}<div id="m-trd-${slot}"></div></div>`;
        if(act&&s.currentPicks.length<6)h+=`<button class="btn btn-gold" id="m-tbtn-${slot}" onclick="mDrawTeam(${slot})">Draw Pick #${s.currentPicks.length+1}</button>`;
        if(act&&s.currentPicks.length===6){if(slot<2)h+=`<button class="btn btn-gold" onclick="mNextGroup()">Next Group →</button>`;else h+=`<button class="btn btn-gold" onclick="mFinish()">See Final Draft Order →</button>`;}
        const picks=act?s.currentPicks:(result?result.picks:[]);
        if(picks.length){
          h+=`<div class="mprow" style="margin-top:14px">`;
          picks.forEach((pk,pi)=>{
            const t=grp[pk.teamRank];const overall=slot*6+(pi+1);
            h+=`<div class="mpchip"><span class="mpnum">#${overall}</span>${limg(t.abbr,22)}<div><div class="mpname">${t.fullName}</div><div class="mpcombo">{${pk.combo.join('·')}}</div></div>${arrowBadgeMini(t)}</div>`;
          });
          h+=`</div>`;
        }
      }
      h+=`</div>`;
    });
  }else{
    h+=fullHTML({go:s.goResult.ordering,goCombo:s.goResult.combo,fullOrder:s.fullOrder});
    h+=`<div style="margin-top:18px"><button class="btn btn-out" onclick="resetStep()">↺ Run Again</button></div>`;
  }
  body.innerHTML=h;
}

async function mDrawGroup(){
  const btn=document.getElementById('m-gobtn');if(btn)btn.disabled=true;
  const id='m-gdrm';let tries=0;
  while(true){
    tries++;
    if(tries>1){document.getElementById('m-grd').innerHTML=`<div class="redraw-note">Void combo — redrawing…</div>`;await sl(600);resetDrum(id);}
    await spinDrum(id,900);const att=draw4();await animateDraw(id,att.balls);
    if(att.key===VOID_KEY){setSt('m-gst','Void — redraw!','');await sl(600);resetDrum(id);continue;}
    const oi=GO_MAP[att.key];if(oi===undefined){resetDrum(id);continue;}
    MS.goResult={ordering:GROUP_ORDERINGS[oi],combo:att.balls,key:att.key};
    setTrayResult(id,att.balls,null,null,MS.goResult.ordering);
    setSt('m-gst',MS.goResult.ordering.map(g=>GN[g]).join(' → '),`Combo {${att.balls.join('·')}}`);
    document.getElementById('m-grd').innerHTML='';
    break;
  }
  MS.phase='group_reveal';renderStepBody();
}

function mStartTeams(){MS.phase='teams';MS.currentSlot=0;MS.currentPicks=[];MS.remaining=new Set([0,1,2,3,4,5]);renderStepBody();}

async function mDrawTeam(slot){
  const btn=document.getElementById(`m-tbtn-${slot}`);if(btn)btn.disabled=true;
  const id=`m-tdrm-${slot}`;const gi=MS.goResult.ordering[slot];const grp=GROUPS[gi];
  let tries=0;let res;
  while(true){
    tries++;
    if(tries>1){document.getElementById(`m-trd-${slot}`).innerHTML=`<div class="redraw-note">${tries===2?'Void combo':'Already drawn'} — redraw…</div>`;await sl(500);resetDrum(id);}
    await spinDrum(id,800);const att=draw4();await animateDraw(id,att.balls);
    if(att.key===VOID_KEY){setSt(`m-tst-${slot}`,'Void — redraw!','');await sl(500);resetDrum(id);continue;}
    const ri=TEAM_MAP[att.key];if(ri===undefined){resetDrum(id);continue;}
    if(!MS.remaining.has(ri)){setSt(`m-tst-${slot}`,'Already picked — redraw!','');await sl(500);resetDrum(id);continue;}
    MS.remaining.delete(ri);res={teamRank:ri,combo:att.balls,key:att.key};break;
  }
  document.getElementById(`m-trd-${slot}`).innerHTML='';
  const t=grp[res.teamRank];
  setTrayResult(id,res.combo,t,gi,null);
  setSt(`m-tst-${slot}`,t.fullName,`{${res.combo.join('·')}}`);
  MS.currentPicks.push(res);
  if(MS.currentPicks.length===6)MS.slotResults[slot]={gi,picks:[...MS.currentPicks]};
  renderStepBody();
}

function mNextGroup(){MS.currentSlot++;MS.currentPicks=[];MS.remaining=new Set([0,1,2,3,4,5]);renderStepBody();}
function mFinish(){
  MS.fullOrder=buildFullOrder(MS.goResult.ordering,MS.slotResults);
  MS.phase='done';
  addHist({goResult:MS.goResult,slotResults:MS.slotResults,fullOrder:MS.fullOrder});
  renderStepBody();confetti();
}

function fullHTML({go,goCombo,fullOrder}){
  let h=`<div style="margin-top:22px"><div class="slabel">Group order</div><div class="gostrip" style="margin-bottom:6px">`;
  go.forEach((gi,i)=>{if(i>0)h+=`<span class="goarr">→</span>`;h+=`<div class="gob"><span class="goslot">${i+1}.</span><span class="gogrp ${GGC[gi]}">${GN[gi]}</span></div>`;});
  h+=`</div><div style="font-size:12px;color:var(--faint);margin-bottom:18px">Winning combo: {${goCombo.join('·')}}</div><div class="slabel">Full draft order — picks 1–18</div><div class="dresults">`;
  fullOrder.forEach(({t,g,o,combo})=>{
    h+=`<div class="drow"><div class="dpick ${o<=3?'t3':''}">${o}</div><div class="dlogo">${limg(t.abbr,32)}</div><div class="dinfo"><div class="dname">${t.fullName}${arrowBadgeMini(t)}</div><div class="drec">${t.wins}–${t.losses}</div><div class="dcombo">{${combo.join('·')}}</div></div><div class="dright"><span class="dtag ${DTC[g]}">${GN[g]}</span></div></div>`;
  });
  h+=`</div></div>`;return h;
}
function buildFullOrder(ordering,slotResults){
  const f=[];
  ordering.forEach((gi,slot)=>{
    const grp=GROUPS[gi];
    const picks=slotResults[slot]?slotResults[slot].picks:[];
    picks.forEach((pk,pi)=>f.push({t:grp[pk.teamRank],g:gi,gp:pi+1,o:slot*6+pi+1,combo:pk.combo}));
  });
  return f;
}

// ════════════════════════════════════════════════════
function drumHTML(id,drawnBalls=null){
  const drawn=new Set(drawnBalls||[]);
  const balls=Array.from({length:14},(_,i)=>i+1).map(n=>`<div class="nball ${drawn.has(n)?'popped spent':''}" id="${id}-b${n}">${n}</div>`).join('');
  const slots=[0,1,2,3].map(i=>{const f=drawnBalls&&drawnBalls[i];return`<div class="tslot ${f?'filled':''}" id="${id}-ts${i}">${f||''}</div>${i<3?'<span class="tray-sep">·</span>':''}`;}).join('');
  const revContent=drawnBalls?`<div class="tray-clbl">Combination</div><div class="tray-cval">{${drawnBalls.join('·')}}</div>`:`<div class="tray-drawing">Awaiting draw…</div>`;
  return`<div class="drum14"><div class="drum14-balls">${balls}</div><div class="tray-lbl">Drawn combination</div><div class="tray">${slots}<div class="tray-reveal" id="${id}-rev">${revContent}</div></div></div>`;
}

async function spinDrum(id,ms){
  const balls=[];for(let n=1;n<=14;n++){const b=document.getElementById(`${id}-b${n}`);if(b&&!b.classList.contains('spent'))balls.push(b);}
  balls.forEach(b=>b.classList.add('spinning'));
  await sl(ms);
  balls.forEach(b=>b.classList.remove('spinning'));
}

function resetDrum(id){
  for(let n=1;n<=14;n++){const b=document.getElementById(`${id}-b${n}`);if(b){b.classList.remove('spinning','popped','spent');b.style.opacity='';b.style.transform='';}}
  for(let i=0;i<4;i++){const s=document.getElementById(`${id}-ts${i}`);if(s){s.className='tslot';s.textContent='';}}
  const rev=document.getElementById(`${id}-rev`);if(rev)rev.innerHTML=`<div class="tray-drawing">Awaiting draw…</div>`;
}

async function animateDraw(id,balls){
  for(let i=0;i<balls.length;i++){
    const n=balls[i];
    const ball=document.getElementById(`${id}-b${n}`);
    if(ball){ball.classList.remove('spinning');ball.classList.add('popped');await sl(190);ball.classList.add('spent');}
    const slot=document.getElementById(`${id}-ts${i}`);
    if(slot){slot.className='tslot filled';slot.textContent=n;}
    await sl(150);
  }
  const rev=document.getElementById(`${id}-rev`);
  if(rev)rev.innerHTML=`<div class="tray-clbl">Combination</div><div class="tray-cval">{${balls.join('·')}}</div>`;
}

function setTrayResult(id,combo,team,gi,ordering){
  const rev=document.getElementById(`${id}-rev`);if(!rev)return;
  let h=`<div class="tray-clbl">Combination</div><div class="tray-cval">{${combo.join('·')}}</div>`;
  if(team){h+=`<div class="tray-trow" style="margin-top:4px">${limg(team.abbr,28)}<span class="tray-tname">${team.fullName}</span></div>`;}
  if(ordering){
    h+=`<div class="tray-trow" style="margin-top:4px">`;
    ordering.forEach((gIdx,pos)=>{if(pos>0)h+=`<span style="color:var(--faint);font-size:13px">→</span>`;h+=`<span class="gogrp ${GGC[gIdx]}" style="font-size:12px;padding:2px 8px">${GN[gIdx]}</span>`;});
    h+=`</div>`;
  }
  rev.innerHTML=h;
}

function appendPickLog(logId,pickInGroup,overall,team,gi,combo){
  const log=document.getElementById(logId);if(!log)return;
  const row=document.createElement('div');row.className='pl-row';
  row.innerHTML=`<div class="pl-n ${overall<=3?'t3':''}">${overall}</div><div class="pl-combo">{${combo.join('·')}}</div>${limg(team.abbr,28)}<div class="pl-team">${team.fullName}${arrowBadgeMini(team)}</div>`;
  log.appendChild(row);
}

// ════════════════════════════════════════════════════
// UTILITIES
// ════════════════════════════════════════════════════
function aSVG(dir){
  if(dir==='up')return`<svg width="9" height="9" viewBox="0 0 10 10" fill="none"><path d="M5 8V2M2 5l3-3 3 3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  if(dir==='dn')return`<svg width="9" height="9" viewBox="0 0 10 10" fill="none"><path d="M5 2v6M2 5l3 3 3-3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  return`<svg width="9" height="9" viewBox="0 0 10 10" fill="none"><path d="M2 5h6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>`;
}
function arrowBadge(t){if(t.movedUp)return`<span class="arrow up">${aSVG('up')} Moved up</span>`;if(t.movedDown)return`<span class="arrow dn">${aSVG('dn')} Moved down</span>`;return`<span class="arrow same">${aSVG('same')} —</span>`;}
function arrowBadgeMini(t){if(t.movedUp)return`<span class="arrow up" style="font-size:10px;padding:1px 5px">${aSVG('up')}</span>`;if(t.movedDown)return`<span class="arrow dn" style="font-size:10px;padding:1px 5px">${aSVG('dn')}</span>`;return'';}
function limg(abbr,sz=30){const id=TIDS[abbr];if(!id)return`<div style="width:${sz}px;height:${sz}px;background:var(--faint);border-radius:50%;flex-shrink:0"></div>`;return`<img src="https://cdn.nba.com/logos/nba/${id}/global/L/logo.svg" style="width:${sz}px;height:${sz}px;object-fit:contain;display:block;flex-shrink:0" onerror="this.style.visibility='hidden'" alt="${abbr}">`;}
function setSt(id,main,sub=''){const e=document.getElementById(id);if(e)e.innerHTML=`<span class="dsmain">${main}</span>${sub?`<span class="dssub">${sub}</span>`:''}`;}
function setProg(id,p){const e=document.getElementById(id);if(e)e.style.width=Math.min(100,p)+'%';}
function setDot(st,txt){const e=document.getElementById('livedot');if(!e)return;e.className='livedot '+st;e.textContent=txt;}
function sl(ms){return new Promise(r=>setTimeout(r,ms));}
function confetti(){const cols=['#f59e0b','#ef4444','#3b82f6','#22c55e','#ffffff','#a855f7'];for(let i=0;i<80;i++)setTimeout(()=>{const p=document.createElement('div');p.style.cssText=`position:fixed;top:-10px;left:${Math.random()*100}vw;width:${5+Math.random()*7}px;height:${5+Math.random()*7}px;background:${cols[Math.floor(Math.random()*cols.length)]};border-radius:${Math.random()>.5?'50%':'2px'};pointer-events:none;z-index:9999;animation:cffall ${1.4+Math.random()*2}s linear forwards`;document.body.appendChild(p);setTimeout(()=>p.remove(),3500);},i*22);}

init();
</script>
