<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NBA Draft Lottery Simulator (ESPN Feed)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;800&family=Barlow:wght@400;600&display=swap" rel="stylesheet">
<style>
    /* Keeping your existing styles for consistency */
    :root{--bg:#0a0e1a;--surf:#111827;--surf2:#1a2235;--txt:#f0f4ff;--muted:#8892a4;--accent:#3b82f6;}
    body{background:var(--bg);color:var(--txt);font-family:'Barlow',sans-serif;margin:0;padding:20px;}
    .container{max-width:1000px;margin:0 auto;}
    .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:30px;}
    .group-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px;}
    .card{background:var(--surf);border-radius:12px;padding:20px;border:1px solid rgba(255,255,255,0.05);}
    .team-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.03);}
    .odds-pill{background:var(--surf2);padding:2px 8px;border-radius:4px;font-size:0.85em;color:var(--accent);font-weight:600;}
    .btn{background:var(--accent);color:white;border:none;padding:12px 24px;border-radius:8px;font-weight:700;cursor:pointer;width:100%;font-size:1.1em;margin-top:20px;}
    .btn:hover{filter:brightness(1.1);}
    .livedot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px;background:#22c55e;}
</style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>NBA LOTTERY SIMULATOR</h1>
        <div id="status"><span class="livedot"></span> ESPN LIVE FEED</div>
    </div>

    <div id="app-content">
        <div class="group-grid" id="groups-container">
            </div>
        <button class="btn" onclick="runSim()">RUN LOTTERY SIMULATION</button>
    </div>

    <div id="results" style="margin-top:40px;"></div>
</div>

<script>
    const TEAM_ALLOC = [286, 203, 157, 119, 88, 67]; // Top seed gets 28.6%
    let lotteryPool = [];

    async function init() {
        try {
            // Fetching from the new faster Vercel function
            const res = await fetch('/api/standings');
            const data = await res.json();
            
            if (data.success) {
                lotteryPool = data.teams;
                renderGroups();
            }
        } catch (e) {
            console.error("Failed to load standings", e);
        }
    }

    function renderGroups() {
        const container = document.getElementById('groups-container');
        container.innerHTML = '';
        
        for (let i = 0; i < 3; i++) {
            const groupTeams = lotteryPool.filter(t => t.group === i);
            let html = `<div class="card"><h3>GROUP ${i + 1}</h3>`;
            
            groupTeams.forEach((team, idx) => {
                const odds = (TEAM_ALLOC[idx] / 10).toFixed(1);
                html += `
                    <div class="team-row">
                        <span><strong>${team.fullName || team.name}</strong> (${team.wins}-${team.losses})</span>
                        <span class="odds-pill">${odds}% Odds</span>
                    </div>`;
            });
            
            html += `</div>`;
            container.innerHTML += html;
        }
    }

    function runSim() {
        // Simple simulation logic based on updated weights
        const resultsDiv = document.getElementById('results');
        resultsDiv.innerHTML = "<h2>Lottery Results</h2>";
        
        [0, 1, 2].forEach(groupId => {
            const groupTeams = lotteryPool.filter(t => t.group === groupId);
            const winner = simulateGroup(groupTeams);
            resultsDiv.innerHTML += `<p>Group ${groupId + 1} Winner: <strong>${winner.fullName || winner.name}</strong></p>`;
        });
    }

    function simulateGroup(teams) {
        const rand = Math.random() * 1000;
        let cumulative = 0;
        for (let i = 0; i < teams.length; i++) {
            cumulative += TEAM_ALLOC[i];
            if (rand <= cumulative) return teams[i];
        }
        return teams[0];
    }

    init();
</script>
</body>
</html>
